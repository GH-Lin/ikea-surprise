<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IKEA - 商品詳情</title>
  <style>
    body { font-family: 'Noto Sans', 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #111; }
    .header { background-color: #0058a3; color: #fbd914; padding: 15px 20px; font-size: 24px; font-weight: 900; display: flex; justify-content: space-between; align-items: center;}
    .container { padding: 20px; max-width: 600px; margin: 0 auto; }
    .media-container { width: 100%; background: #f5f5f5; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
    .media-container video, .media-container img { width: 100%; display: block; }
    .product-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .product-name { font-size: 32px; font-weight: 900; margin: 0; text-transform: uppercase; }
    .product-sub { font-size: 16px; color: #484848; margin-top: 5px; }
    .price-tag { background-color: #fbd914; display: inline-block; padding: 5px 15px; font-size: 28px; font-weight: 900; margin-bottom: 20px; }
    .description { font-size: 16px; line-height: 1.6; margin-bottom: 30px; border-top: 1px solid #dfdfdf; padding-top: 20px; }
    .highlight { color: #e0000f; font-weight: bold; } /* 終點用紅色特別標示 */
  </style>
</head>
<body>
  <div class="header"><span>IKEA</span><span style="font-size: 16px; font-weight: normal; color: white;">最終驚喜</span></div>
  <div class="container">
    <div class="media-container">
      <img src="第四關照片檔名.jpg" alt="專屬驚喜">
    </div>
    <div class="product-header">
      <div>
        <h1 class="product-name">瑞典文品名</h1>
        <div class="product-sub">副標題 / 專屬描述</div>
      </div>
    </div>
    <div class="price-tag">$ 價格</div>
    <div class="description">
      <p><b>產品描述：</b><br>這裡可以寫上第四關專屬的感人文案或搞笑材質說明。</p>
      <p><b>🎉 最終任務：</b><br>（如果這是最後一關，就把引導去餐廳迎接的文字放在這裡）</p>
    </div>
  </div>
</body>
</html>
